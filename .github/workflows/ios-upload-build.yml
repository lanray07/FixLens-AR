name: iOS Upload Build

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "CFBundleShortVersionString / App Store version"
        required: true
        default: "1.0"
      build_number:
        description: "CFBundleVersion. Leave empty to use the GitHub run number."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  archive-upload:
    name: Archive and upload to App Store Connect
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      PROJECT_PATH: FixLensAR.xcodeproj
      SCHEME: FixLensAR
      CONFIGURATION: Release
      BUNDLE_ID: com.fixlens.ar
      MARKETING_VERSION: ${{ inputs.marketing_version }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Validate upload secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is missing. Add the matching repository secret before running this workflow."
              missing=1
            fi
          done
          exit "$missing"

      - name: Create App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          python3 - <<'PY'
          import os
          from pathlib import Path

          key_id = os.environ["ASC_KEY_ID"]
          key = os.environ["ASC_PRIVATE_KEY"].replace("\\n", "\n").strip() + "\n"
          key_dir = Path(os.environ["RUNNER_TEMP"]) / "private_keys"
          key_dir.mkdir(parents=True, exist_ok=True)
          key_path = key_dir / f"AuthKey_{key_id}.p8"
          key_path.write_text(key, encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"ASC_KEY_PATH={key_path}\n")
          PY
          chmod 600 "$KEY_PATH"

      - name: Compute build number
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.build_number }}" ]; then
            echo "BUILD_NUMBER=${{ inputs.build_number }}" >> "$GITHUB_ENV"
          else
            echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Archive app
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/FixLensAR.xcarchive"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            clean archive

      - name: Create export options
        shell: bash
        run: |
          set -euo pipefail
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "EXPORT_OPTIONS=$EXPORT_OPTIONS" >> "$GITHUB_ENV"

      - name: Upload archive to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          EXPORT_PATH="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_PATH"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload archive artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: FixLensAR-xcarchive
          path: ${{ runner.temp }}/FixLensAR.xcarchive
          if-no-files-found: ignore
