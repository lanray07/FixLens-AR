name: iOS Upload Build

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "CFBundleShortVersionString / App Store version"
        required: true
        default: "1.0"
      build_number:
        description: "CFBundleVersion. Leave empty to use the GitHub run number."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  archive-upload:
    name: Build signed IPA and upload to App Store Connect
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      PROJECT_PATH: FixLensAR.xcodeproj
      SCHEME: FixLensAR
      CONFIGURATION: Release
      BUNDLE_ID: com.fixlens.ar
      MARKETING_VERSION: ${{ inputs.marketing_version }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Validate upload secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is missing. Add the matching repository secret before running this workflow."
              missing=1
            fi
          done
          exit "$missing"

      - name: Compute build number
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.build_number }}" ]; then
            echo "BUILD_NUMBER=${{ inputs.build_number }}" >> "$GITHUB_ENV"
          else
            echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Build and upload
        shell: bash
        run: |
          set -euo pipefail
          bundle exec fastlane ios upload_build

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: FixLensAR-build-diagnostics
          path: |
            build
            ~/Library/Logs/gym
          if-no-files-found: ignore
